---
# expects a dict like this:
# binary:
#   name: string
#   path: string
#   url: string
#   unpack: bool

- name: Check downloaded file checksum for '{{ binary.name }}'
  ansible.builtin.stat:
    path: "{{ cache_disk_mount }}/custom_binaries/{{ binary.name }}/{{ binary.url.rsplit('/', 1)[-1] }}"
    checksum_algorithm: sha256
  register: downloaded_file

- name: Check if target file exists for '{{ binary.name }}'
  ansible.builtin.stat:
    path: "{{ binary.path }}"
  register: dest_file

- name: Create nodes custom binaries mount directories on cache disk
  become: true
  ansible.builtin.command: mkdir -p {{ cache_disk_mount }}/custom_binaries
  args:
    creates: "{{ cache_disk_mount }}/custom_binaries"

- name: Download, extract, install and cleanup for '{{ binary.name }}'
  when: >
    not dest_file.stat.exists
    or not downloaded_file.stat.exists
    or downloaded_file.stat.checksum != (binary.checksum | regex_replace('^sha256:', ''))
  block:
    - name: Create cache directory for '{{ binary.name }}'
      become: true
      ansible.builtin.file:
        path: "{{ cache_disk_mount }}/custom_binaries/{{ binary.name }}"
        state: directory
        owner: "{{ ansible_facts['user_uid'] }}"
        mode: "0755"
      register: download_dir

    - name: Download '{{ binary.name }}'
      ansible.builtin.get_url:
        url: "{{ binary.url }}"
        dest: "{{ download_dir.path }}"
        checksum: "{{ binary.checksum }}"
        mode: "0644"
      when: >
        not downloaded_file.stat.exists
        or downloaded_file.stat.checksum != (binary.checksum | regex_replace('^sha256:', ''))

    - name: Unpack '{{ binary.name }}'
      ansible.builtin.unarchive:
        src: "{{ download_dir.path }}/{{ src }}"
        dest: "{{ download_dir.path }}"
        remote_src: true
      vars:
        src: "{{ binary.url.rsplit('/', 1)[-1] }}"
      when: binary.unpack

    - name: Find the right file to install for '{{ binary.name }}'
      become: true
      # we don't really know where is the file we want to install,
      # specially if inside an unpacked archive
      # this search should work for both raw/unpacked binaries
      ansible.builtin.find:
        path: "{{ download_dir.path }}"
        pattern: "*{{ binary.name }}*"
        recurse: true
        excludes:
          - "*tar.gz"
          - "*tar.bz2"
          - "*tar"
      register: find
      when: download_dir.path is defined
      # assert: something is really wrong if we couldn't find a file to install
      failed_when: find.matched < 1

    - name: Install '{{ binary.name }}'
      ansible.builtin.copy:
        src: "{{ src }}"
        dest: "{{ binary.path }}"
        mode: "0755"
        remote_src: true
      vars:
        src: "{{ find.files[0].path }}"
